services:
  nginx:
    image: nginx:1.27-alpine
    container_name: centelha-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/html:ro,z
      - ./app/public:/var/www/html/public:ro,z
      - ./app/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - centelha
  php:
    build:
      context: ./app
      dockerfile: Dockerfile
      target: dev
    container_name: centelha-php
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - ./app/.env.docker
    environment:
      RUN_MIGRATIONS: "0"
      RUN_SEEDERS: "0"
      APP_ENV: local
      PHP_OPCACHE_VALIDATE_TIMESTAMPS: "1"
    volumes:
      - ./app:/var/www/html:z
      - ./app/public:/var/www/html/public
    depends_on:
      pgsql:
        condition: service_healthy
    networks:
      - centelha

  vite:
    image: node:22-bookworm
    container_name: centelha-vite
    working_dir: /var/www/html
    volumes:
      - ./app:/var/www/html:z
    environment:
      - VITE_HOST=0.0.0.0
      - VITE_HMR_HOST=localhost
    command: ["sh", "-c", "npm install && npm run dev -- --host"]
    ports:
      - "5173:5173"
    depends_on:
      - php
    networks:
      - centelha

  pgsql:
    image: postgres:16-alpine
    container_name: centelha-pgsql
    restart: unless-stopped
    environment:
      POSTGRES_DB: centelha
      POSTGRES_USER: centelha
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgsql-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U centelha -d centelha"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - centelha

volumes:
  pgsql-data:
    driver: local

networks:
  centelha:
    driver: bridge
